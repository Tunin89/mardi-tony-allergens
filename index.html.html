<style>
  :root{
    --cream:#f3eddc;
    --cream-deep:#ece3cd;
    --navy:#23394d;
    --navy-soft:#3a5169;
    --coral:#d56b4a;
    --olive:#8a9663;
    --olive-soft:#a7b083;
    --line:#d8cdae;
    --ink:#404a52;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Jost',sans-serif;
    line-height:1.55;
    padding:0 0 56px;
    background-image:radial-gradient(circle at 12% 8%, rgba(213,107,74,.05), transparent 38%),
                     radial-gradient(circle at 88% 22%, rgba(138,150,99,.06), transparent 40%);
  }

  /* ---------- Header ---------- */
  header{
    text-align:center;
    padding:38px 22px 18px;
    border-bottom:1px solid var(--line);
    position:relative;
  }
  .hero-ico{width:54px;margin:0 auto 14px}
  .hero-ico svg{width:54px;height:72px;display:block}
  .eyebrow{
    font-size:.66rem;letter-spacing:.34em;text-transform:uppercase;
    color:var(--olive);font-weight:500;margin-bottom:14px;
  }
  h1{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;font-weight:600;
    color:var(--navy);
    font-size:2.7rem;line-height:1;
    margin-bottom:6px;
  }
  .sub{
    font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;
    color:var(--navy-soft);font-weight:500;
  }
  .date{
    font-size:.66rem;letter-spacing:.2em;text-transform:uppercase;
    color:var(--coral);margin-top:10px;font-weight:500;
  }

  /* ---------- Language toggle ---------- */
  .langbar{
    position:sticky;top:0;z-index:20;
    background:var(--cream);
    display:flex;justify-content:center;gap:6px;
    padding:12px 14px;
    border-bottom:1px solid var(--line);
    box-shadow:0 6px 14px -12px rgba(35,57,77,.4);
  }
  .langbar button{
    font-family:'Jost',sans-serif;
    font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;font-weight:500;
    color:var(--navy-soft);
    background:transparent;
    border:1px solid var(--line);
    border-radius:30px;
    padding:9px 18px;
    cursor:pointer;
    transition:all .18s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .langbar button.active{
    background:var(--navy);color:var(--cream);border-color:var(--navy);
  }

  /* ---------- Intro note ---------- */
  .intro{
    max-width:620px;margin:24px auto 6px;padding:0 26px;
    text-align:center;font-size:.86rem;color:var(--navy-soft);
  }

  /* ---------- Sections ---------- */
  main{max-width:640px;margin:0 auto;padding:8px 18px 0}
  .section{margin-top:30px}
  .section-head{
    display:flex;align-items:center;gap:14px;
    margin:0 6px 14px;
  }
  .section-head::after{
    content:"";flex:1;height:1px;background:var(--line);
  }
  .section-head h2{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;font-weight:600;
    color:var(--navy);font-size:1.5rem;
    white-space:nowrap;
  }
  .section-head .ico{display:flex;align-items:center}
  .sec-svg{width:30px;height:30px;display:block}

  /* ---------- Dish cards ---------- */
  .dish{
    background:rgba(255,255,255,.42);
    border:1px solid var(--line);
    border-radius:14px;
    padding:15px 17px;
    margin-bottom:11px;
  }
  .dish-name{
    font-family:'Cormorant Garamond',serif;
    font-weight:600;color:var(--navy);
    font-size:1.12rem;line-height:1.25;
    margin-bottom:9px;
  }
  .tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:11px}
  .tag{
    font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;font-weight:600;
    padding:3px 8px;border-radius:20px;
    background:var(--olive-soft);color:#36402a;
  }
  .row{display:flex;gap:9px;font-size:.82rem;margin-bottom:5px}
  .row:last-child{margin-bottom:0}
  .row .lbl{
    flex-shrink:0;font-weight:600;font-size:.62rem;letter-spacing:.1em;
    text-transform:uppercase;padding-top:2px;width:74px;
  }
  .row.contains .lbl{color:var(--coral)}
  .row.traces .lbl{color:var(--navy-soft)}
  .row .val{color:var(--ink)}
  .row.traces .val{color:var(--navy-soft);font-size:.78rem}
  .none{font-style:italic;color:var(--olive)}

  footer{
    text-align:center;margin:40px auto 0;padding:0 26px;
    font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;
    color:var(--olive);
  }
  footer .heart{font-family:'Cormorant Garamond',serif;font-style:italic;
    text-transform:none;letter-spacing:0;font-size:1rem;color:var(--coral);
    display:block;margin-top:8px}

  [hidden]{display:none!important}
  @media(max-width:380px){
    h1{font-size:2.3rem}
    .row{flex-direction:column;gap:1px}
    .row .lbl{width:auto}
  }
</style>

let LANG="en";

function allergenList(keys){return keys.map(k=>A[k][LANG]).join(", ");}

function render(){
  const u=UI[LANG];
  document.documentElement.lang=LANG;
  document.querySelectorAll("[data-i]").forEach(el=>{
    const k=el.getAttribute("data-i");
    if(u[k])el.textContent=u[k];
  });
  const m=document.getElementById("menu");
  m.innerHTML="";
  MENU.forEach(block=>{
    const sec=document.createElement("section");
    sec.className="section";
    sec.innerHTML=`<div class="section-head"><span class="ico">${ICON[block.sec]||""}</span><h2>${u.sections[block.sec]}</h2></div>`;
    block.dishes.forEach(d=>{
      const traces = d.t==="rest"?traceRest(d.c):d.t;
      const tagsHtml = d.tags.map(t=>`<span class="tag">${DT[t][LANG]}</span>`).join("");
      const containsHtml = d.c.length
        ? `<span class="val">${allergenList(d.c)}</span>`
        : `<span class="val none">${u.none}</span>`;
      const card=document.createElement("div");
      card.className="dish";
      card.innerHTML=`
        <div class="dish-name">${d.name[LANG]}</div>
        ${tagsHtml?`<div class="tags">${tagsHtml}</div>`:""}
        <div class="row contains"><span class="lbl">${u.contains}</span>${containsHtml}</div>
        <div class="row traces"><span class="lbl">${u.traces}</span><span class="val">${allergenList(traces)}</span></div>
      `;
      sec.appendChild(card);
    });
    m.appendChild(sec);
  });
}

function setLang(l){
  LANG=l;
  document.querySelectorAll(".langbar button").forEach(b=>{
    b.classList.toggle("active", b.getAttribute("data-lang")===l);
  });
  render();
  window.scrollTo({top:0,behavior:"smooth"});
}

render();
</script>
